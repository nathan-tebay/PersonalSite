<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tebay.dev</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body data-page="home">
  <div class="page-layout">

    <div id="layout-nav"></div>

    <!-- Main column -->
    <div class="main-col">

      <!-- Top row: logo + right column -->
      <div class="top-row">
        <div id="panel">
          <div id="logo-wrap">
            <img src="tebay-dev.svg" alt="Tebay.dev logo">
          </div>
        </div>

        <div class="right-col">
          <div id="info-panel" class="side-panel">
            <div>
              <h2>Nathan Tebay</h2>
              <p class="subtitle">Software Developer</p>
            </div>
            <div class="divider"></div>
            <div>
              <span class="section-label">About</span>
              <p>Your bio goes here. A short description of who you are, what you do, and what you're passionate about.</p>
            </div>
            <div class="divider"></div>
            <div>
              <span class="section-label">Links</span>
              <a href="#">GitHub</a>
              <a href="#">LinkedIn</a>
              <a href="#">tebay.dev</a>
            </div>
            <div class="divider"></div>
            <div>
              <span class="section-label">Contact</span>
              <p>your@email.com</p>
            </div>
          </div>

          <div id="picker-wrap" class="side-panel">
            <span class="section-label">Theme</span>
            <div id="swatches"></div>
          </div>
        </div>
      </div>

      <!-- Content panel -->
      <div id="content-panel" class="side-panel"></div>

    </div>
  </div>

  <script src="assets/layout.js"></script>
  <script src="assets/script.js"></script>
</body>
</html>
